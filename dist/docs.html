<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Details</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 24px;
        font-family: Arial, Helvetica, sans-serif;
        background: #f4f7ff;
        color: #121212;
      }
      .doc {
        max-width: 700px;
        margin: 0 auto;
        padding: 28px;
        border-radius: 12px;
        background: #ffffff;
        border: 1px solid #dbe1f0;
      }
      h1 {
        margin: 0 0 18px;
        font-size: 24px;
      }
      .row {
        display: grid;
        grid-template-columns: 120px 1fr;
        gap: 10px;
        padding: 8px 0;
        border-bottom: 1px solid #eef2fb;
      }
      .label {
        font-weight: 700;
      }
      .empty {
        opacity: 0.65;
        font-style: italic;
      }
      .footer {
        margin-top: 16px;
        font-size: 12px;
        color: #556;
      }
    </style>
  </head>
  <body>
    <main class="doc">
      <h1>Scanned QR Details</h1>
      <div id="details"></div>
      <div class="footer" id="meta"></div>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const encoded = params.get("data");
      const detailsEl = document.getElementById("details");
      const metaEl = document.getElementById("meta");

      const showRow = (label, value) => {
        const row = document.createElement("div");
        row.className = "row";
        const labelEl = document.createElement("div");
        labelEl.className = "label";
        labelEl.textContent = label;
        const valueEl = document.createElement("div");
        valueEl.textContent = value || "Not provided";
        if (!value) valueEl.className = "empty";
        row.appendChild(labelEl);
        row.appendChild(valueEl);
        detailsEl.appendChild(row);
      };

      if (!encoded) {
        detailsEl.textContent = "No details were found in this QR code.";
      } else {
        try {
          const binary = atob(encoded);
          const bytes = Uint8Array.from(binary, (char) => char.charCodeAt(0));
          const data = JSON.parse(new TextDecoder().decode(bytes));
          showRow("Name", data.name || "");
          showRow("Job Role", data.jobRole || "");
          showRow("ID No", data.idNo || "");
          showRow("Phone", data.phone || "");
          showRow("Email", data.email || "");
          showRow("Location", data.location || "");
          metaEl.textContent = data.qrId ? `QR Ref: ${data.qrId}` : "";
        } catch {
          detailsEl.textContent = "The QR details could not be decoded.";
        }
      }
    </script>
  </body>
</html>
